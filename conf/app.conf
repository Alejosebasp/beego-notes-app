appname = notes-app
httpport = ${HTTP_PORT||8080}
runmode = prod
copyrequestbody = true

EnableXSRF = true
xsrfkey = 61be5450a88775246d3200a1210887b9
xsrfexpire = 3600

EnableHTTP = false
EnableHTTPS = true
httpsport = ${HTTPS_PORT||8443}
httpscertfile = ${HTTPS_CERT||conf/cert.pem}
httpskeyfile = ${HTTPS_KEY||conf/key.pem}
